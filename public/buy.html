<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Properties</title>
  
  <!-- Add ethers.js for blockchain interaction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f7fb;
    }

    nav {
      background-color: #1a1a1a;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-size: 22px;
      font-weight: bold;
    }

    .property-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 40px 20px;
      gap: 25px;
    }

    .property-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 260px;
      padding: 15px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .property-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .property-card img {
      width: 100%;
      height: 170px;
      border-radius: 10px;
      object-fit: cover;
    }

    .property-card h3 {
      margin: 10px 0 5px;
      font-size: 20px;
    }

    .property-card p {
      color: #555;
      margin: 3px 0;
    }

    .buy-btn {
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    .buy-btn:hover {
      background-color: #45a049;
    }

    .buy-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .empty-msg {
      text-align: center;
      margin-top: 50px;
      font-size: 20px;
      color: #777;
    }

    .network-warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 15px;
      text-align: center;
      margin: 20px;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>

    <div class="nav-logo">🏡 Property Marketplace</div>
    <div id="userDisplay"></div>
  </nav>

  <div id="networkWarning" class="network-warning" style="display: none;"></div>
  <div id="property-container" class="property-container"></div>
  <p id="emptyMsg" class="empty-msg"></p>

  <script>

      },
      {

        "inputs": [
          {
            "indexed": false,
            "internalType": "uint256",

            "type": "uint256"
          },
          {
            "indexed": false,
            "internalType": "address",
            "name": "oldOwner",
            "type": "address"
          },
          {
            "indexed": false,
            "internalType": "address",
            "name": "newOwner",
            "type": "address"
          },
          {
            "indexed": false,
            "internalType": "uint256",
            "name": "price",
            "type": "uint256"
          }
        ],

      },
      {
        "inputs": [
          {

      {

          }
        ],
        "name": "properties",
        "outputs": [
          {

          },
          {

          {

            "type": "string"
          },
          {
            "internalType": "uint256",
            "name": "price",
            "type": "uint256"
          },
          {
            "internalType": "address payable",
            "name": "owner",
            "type": "address"
          },
          {
            "internalType": "bool",
            "name": "isSold",
            "type": "bool"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      },
      {
        "inputs": [],
        "name": "propertyCount",
        "outputs": [
          {
            "internalType": "uint256",
            "name": "",
            "type": "uint256"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      }
    ];

    // Check if user is on Sepolia network
    async function checkNetwork() {
      if (!window.ethereum) {
        document.getElementById('networkWarning').textContent = '⚠️ MetaMask not detected! Please install MetaMask.';
        document.getElementById('networkWarning').style.display = 'block';
        return false;
      }

      const chainId = await window.ethereum.request({ method: 'eth_chainId' });
      
      if (chainId !== SEPOLIA_CHAIN_ID) {
        document.getElementById('networkWarning').innerHTML = `
          ⚠️ Wrong Network! Please switch to <strong>Sepolia Test Network</strong> in MetaMask.
          <br>Current: ${chainId} | Required: Sepolia (${SEPOLIA_CHAIN_ID})
        `;
        document.getElementById('networkWarning').style.display = 'block';
        
        // Try to switch network automatically
        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: SEPOLIA_CHAIN_ID }],
          });
          document.getElementById('networkWarning').style.display = 'none';
          return true;
        } catch (switchError) {
          console.error('Failed to switch network:', switchError);
          return false;
        }
      }
      
      return true;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const userEmail = localStorage.getItem("user");
      const walletAddress = localStorage.getItem("walletAddress");
      const container = document.getElementById("property-container");
      const emptyMsg = document.getElementById("emptyMsg");
      const userDisplay = document.getElementById("userDisplay");

      if (!userEmail || !walletAddress) {
        alert("Please log in and connect your wallet first!");
        window.location.href = "/login";
        return;
      }

      userDisplay.textContent = `👤 ${userEmail} | 💳 ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;

      // Check network on load
      await checkNetwork();

      // Listen for network changes
      if (window.ethereum) {
        window.ethereum.on('chainChanged', () => {
          window.location.reload();
        });
      }

      try {
        const res = await fetch(`/listed?email=${userEmail}`);
        const data = await res.json();

        if (!data.success || !data.listings || data.listings.length === 0) {
          emptyMsg.textContent = "No properties available right now.";
          return;
        }

        data.listings.forEach((p, index) => {
          const card = document.createElement("div");
          card.classList.add("property-card");
          card.innerHTML = `
            <img src="${p.image || './pictures/default.png'}" alt="${p.Name}">
            <h3>${p.Name}</h3>
            <p>📍 ${p.city}</p>
            <p>💰 Price: ₹${p.price}</p>
            <p>Ξ ${p.priceInETH} ETH</p>
            <p style="font-size: 11px; color: #666;">Property ID: ${index + 1}</p>
            <button class="buy-btn" 
                    data-id="${p._id}" 
                    data-property-id="${index + 1}"
                    data-eth="${p.priceInETH}">
              Buy Now
            </button>
          `;
          container.appendChild(card);
        });

        // ==================== REAL BLOCKCHAIN TRANSACTION ====================
        container.addEventListener("click", async (e) => {
          if (e.target.classList.contains("buy-btn")) {
            const dbPropertyId = e.target.getAttribute("data-id");
            const blockchainPropertyId = e.target.getAttribute("data-property-id");
            const priceInETH = e.target.getAttribute("data-eth");
            const button = e.target;

            // Check if MetaMask is available
            if (!window.ethereum) {
              alert("❌ MetaMask not detected! Please install MetaMask extension.");
              window.open("https://metamask.io/download/", "_blank");
              return;
            }

            // Check network
            const isCorrectNetwork = await checkNetwork();
            if (!isCorrectNetwork) {
              alert("⚠️ Please switch to Sepolia Test Network in MetaMask!");
              return;
            }

            const confirmBuy = confirm(
              `🏠 Buy this property for ${priceInETH} ETH?\n\n` +
              `Property ID: ${blockchainPropertyId}\n` +
              `Network: Sepolia Testnet\n` +
              `Contract: ${CONTRACT_ADDRESS}\n\n` +
              `⚠️ Make sure you have enough Sepolia ETH + gas fees!`
            );
            
            if (!confirmBuy) return;

            try {
              button.disabled = true;
              button.textContent = 'Processing...';

              // Initialize ethers.js provider
              const provider = new ethers.providers.Web3Provider(window.ethereum);
              await provider.send("eth_requestAccounts", []);
              const signer = provider.getSigner();
              const buyerAddress = await signer.getAddress();

              console.log('Buyer Address:', buyerAddress);
              console.log('Property ID:', blockchainPropertyId);
              console.log('Price:', priceInETH, 'ETH');

              // Create contract instance
              const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

              // Convert ETH to Wei
              const priceInWei = ethers.utils.parseEther(priceInETH);
              console.log('Price in Wei:', priceInWei.toString());

              button.textContent = 'Confirm in MetaMask...';

              // Call buyProperty function on smart contract
              const tx = await contract.buyProperty(blockchainPropertyId, {
                value: priceInWei,
                gasLimit: 300000 // Set gas limit
              });

              button.textContent = 'Waiting for confirmation...';
              alert(`📤 Transaction sent!\n\nHash: ${tx.hash}\n\nWaiting for confirmation...`);

              // Wait for transaction confirmation
              const receipt = await tx.wait();
              console.log('Transaction confirmed:', receipt);

              button.textContent = 'Updating database...';

              // Update database after blockchain confirmation
              const dbRes = await fetch(`/buy/${dbPropertyId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  buyerWallet: buyerAddress,
                  buyerEmail: userEmail,
                  blockchainTx: receipt.transactionHash,
                  blockNumber: receipt.blockNumber,
                  gasUsed: receipt.gasUsed.toString(),
                  propertyId: blockchainPropertyId
                })
              });

              const result = await dbRes.json();
              
              if (result.success) {
                alert(
                  `✅ Purchase Complete!\n\n` +
                  `Transaction Hash: ${receipt.transactionHash}\n` +
                  `Block Number: ${receipt.blockNumber}\n` +
                  `Gas Used: ${receipt.gasUsed.toString()}\n\n` +
                  `View on Sepolia Etherscan:\n` +
                  `https://sepolia.etherscan.io/tx/${receipt.transactionHash}`
                );
                
                // Open Etherscan in new tab
                window.open(`https://sepolia.etherscan.io/tx/${receipt.transactionHash}`, '_blank');
                
                setTimeout(() => location.reload(), 2000);
              } else {
                alert("⚠️ Blockchain transaction succeeded but database update failed: " + result.message);
              }

            } catch (err) {
              console.error("Transaction failed:", err);
              
              let errorMsg = "⚠️ Transaction failed!\n\n";
              
              if (err.code === 4001) {
                errorMsg += "You rejected the transaction.";
              } else if (err.code === -32603) {
                errorMsg += "Insufficient funds or gas limit too low.";
              } else if (err.message.includes("insufficient funds")) {
                errorMsg += "Insufficient Sepolia ETH balance.\n\nGet free Sepolia ETH from:\nhttps://faucet.quicknode.com/ethereum/sepolia";
              } else {
                errorMsg += err.message || "Unknown error occurred.";
              }
              
              alert(errorMsg);
              button.disabled = false;
              button.textContent = 'Buy Now';
            }
          }
        });

        // ==================== SIMULATION VERSION (COMMENTED OUT) ====================

            const confirmBuy = confirm(`Simulate buying this property for ${priceInETH} ETH?`);

                })
              });

              const result = await res.json();
              if (result.success) {
                alert("✅ Simulated purchase complete! Ownership updated in DB.");
                location.reload();
              } else {
                alert("❌ Simulated purchase failed: " + result.message);
              }

              console.error("Simulation failed:", err);
              alert("⚠️ Error simulating transaction.");
            }
          }
        });
        */

      } catch (err) {
        console.error("Error fetching properties:", err);
        emptyMsg.textContent = "Error loading properties.";
      }
    });
  </script>
