<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Property</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #C9A96E;
            --gold-light: #E8D5B0;
            --gold-dark: #A07840;
            --bg: #0B0C0E;
            --surface: #111318;
            --surface2: #181B22;
            --border: rgba(201,169,110,0.15);
            --border-hover: rgba(201,169,110,0.35);
            --text: #F0EDE8;
            --muted: #888580;
            --danger: #E05C5C;
            --success: #4CAF82;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(201,169,110,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .heading {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 1.75rem;
            text-align: center;
        }

        .wallet-warning {
            background: rgba(201,169,110,0.08);
            border: 1px solid rgba(201,169,110,0.3);
            color: var(--gold);
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 13px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        .input::placeholder { color: #4a4845; }
        .input:focus { border-color: var(--gold-dark); background: #1a1d25; }

        .eth-price-info {
            font-size: 12px;
            color: var(--gold-dark);
            margin-top: -6px;
        }

        /* Checkboxes */
        .features-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .features-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .checkbox-item:hover {
            border-color: var(--border-hover);
            background: #141720;
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--border-hover);
            border-radius: 4px;
            background: var(--surface2);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            position: relative;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: var(--gold);
            border-color: var(--gold);
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: 2px solid #0B0C0E;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        .checkbox-item span {
            font-size: 13px;
            color: var(--muted);
            transition: color 0.2s;
        }

        .checkbox-item:has(input:checked) {
            border-color: var(--border-hover);
            background: rgba(201,169,110,0.06);
        }

        .checkbox-item:has(input:checked) span {
            color: var(--gold-light);
        }

        .blockchain-info {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .blockchain-info h4 {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .blockchain-info p {
            font-size: 12px;
            color: var(--muted);
            margin: 3px 0;
            word-break: break-all;
        }

        .blockchain-info p b { color: var(--text); font-weight: 500; }

        #general-error {
            background: rgba(224,92,92,0.08);
            border: 1px solid rgba(224,92,92,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--danger);
            display: none;
        }

        #success-message {
            background: rgba(76,175,130,0.08);
            border: 1px solid rgba(76,175,130,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--success);
            display: none;
        }

        .login-button {
            width: 100%;
            background: var(--gold);
            color: #0B0C0E;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }

        .login-button:hover { background: var(--gold-light); }
        .login-button:active { transform: scale(0.98); }
        .login-button:disabled { opacity: 0.6; cursor: not-allowed; }

        .login-button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .agreement {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 12px;
            color: var(--muted);
        }

        .agreement a { color: var(--gold-dark); text-decoration: none; }
        .agreement a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div class="heading">List Your Property</div>

        <div class="wallet-warning" id="walletWarning" style="display: none;">
            ⚠️ Please login first to list property.
        </div>

        <form class="form" id="propertyForm">
            <input required class="input" type="text" id="propertyName" placeholder="Property Name (e.g., 3BHK Apartment)">
            <input required class="input" type="text" id="location" placeholder="Location (e.g., Chandigarh, Sector 17)">
            <input required class="input" type="number" step="0.001" id="priceETH" placeholder="Price (in ETH)">
            <div class="eth-price-info" id="ethPriceInfo"></div>
            <div class="features-box">
                <span class="features-label">Property Features</span>
                <div class="features-grid">
                    <label class="checkbox-item">
                        <input type="checkbox" value="school">
                        <span>🏫 Near School</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="hospital">
                        <span>🏥 Near Hospital</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="peaceful">
                        <span>🌿 Peaceful Area</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="luxury">
                        <span>💎 Luxury</span>
                    </label>
                </div>
            </div>

            <div class="blockchain-info">
                <h4>Blockchain Details</h4>
                <p><b>Network:</b> Sepolia Testnet</p>
                <p><b>Contract Address:</b> 0x8FE5DD5b58C59156c2EE49CD446b3C1E300f6d0d</p>
                <p><b>Token:</b> SepoliaETH</p>
                <p><b>Tx Hash:</b> Generated after listing</p>
            </div>

            <span id="general-error"></span>
            <span id="success-message"></span>
            <input class="login-button" type="submit" value="List Property" id="submitBtn">
        </form>
        <span class="agreement"><a href="#">Learn property listing policy</a></span>
    </div>

    <script>
        const form = document.getElementById('propertyForm');
        const generalError = document.getElementById('general-error');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submitBtn');
        const ethPriceInfo = document.getElementById('ethPriceInfo');

        const ethToINR = 200000;

        // ==================== SEPOLIA SMART CONTRACT CONFIGURATION (ACTIVE) ====================
        const SEPOLIA_CHAIN_ID = '0xaa36a7';
        const CONTRACT_ADDRESS = '0x6aA426B160Ebb2a52a1F32d19341480192D5d7d7';
        const CONTRACT_ABI = [
            {
                "inputs": [
                    {"internalType": "string", "name": "_name", "type": "string"},
                    {"internalType": "string", "name": "_location", "type": "string"},
                    {"internalType": "uint256", "name": "_price", "type": "uint256"}
                ],
                "name": "addProperty",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "uint256", "name": "_propertyId", "type": "uint256"}],
                "name": "buyProperty",
                "outputs": [],
                "stateMutability": "payable",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "propertyCount",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            }
        ];

        async function checkSepoliaNetwork() {
            if (typeof window.ethereum === 'undefined') throw new Error('MetaMask not installed!');
            const chainId = await window.ethereum.request({ method: 'eth_chainId' });
            if (chainId !== SEPOLIA_CHAIN_ID) {
                try {
                    await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: SEPOLIA_CHAIN_ID }] });
                } catch (switchError) {
                    if (switchError.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{ chainId: SEPOLIA_CHAIN_ID, chainName: 'Sepolia Test Network', nativeCurrency: { name: 'Sepolia ETH', symbol: 'SepoliaETH', decimals: 18 }, rpcUrls: ['https://rpc.sepolia.org'], blockExplorerUrls: ['https://sepolia.etherscan.io'] }]
                        });
                    } else { throw switchError; }
                }
            }
        }

        async function listPropertyOnBlockchain(propertyName, location, priceInETH) {
            await checkSepoliaNetwork();
            const { ethers } = window;
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();
            const userAddress = await signer.getAddress();
            const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
            const priceInWei = ethers.utils.parseEther(priceInETH.toString());
            const tx = await contract.addProperty(propertyName, location, priceInWei);
            const receipt = await tx.wait();

            // Real property ID from contract
            const count = await contract.propertyCount();

            return {
                owner: userAddress,
                blockchainTx: receipt.transactionHash,
                contractAddress: CONTRACT_ADDRESS,
                network: "Sepolia Testnet",
                tokenSymbol: "SepoliaETH",
                blockchainPropertyId: count.toString()
            };
        }
        // ==================== END OF SEPOLIA CODE ====================

        document.getElementById('priceETH').addEventListener('input', (e) => {
            const ethAmount = parseFloat(e.target.value);
            if (ethAmount && ethAmount > 0) {
                const inrValue = (ethAmount * ethToINR).toLocaleString('en-IN');
                ethPriceInfo.textContent = `≈ ₹${inrValue} (approximate)`;
            } else {
                ethPriceInfo.textContent = '';
            }
        });

        form.addEventListener('submit', async function(e) {
            const selectedAmenities = Array.from(
                document.querySelectorAll('input[type="checkbox"]:checked')
            ).map(cb => cb.value);
            e.preventDefault();

            generalError.style.display = 'none';
            successMessage.style.display = 'none';

            const propertyName = document.getElementById('propertyName').value.trim();
            const location = document.getElementById('location').value.trim();
            const priceETH = document.getElementById('priceETH').value.trim();
            const userEmail = localStorage.getItem('user');
            const walletAddress = localStorage.getItem('walletAddress');

            if (!propertyName || !location || !priceETH) {
                generalError.textContent = 'Please fill in all fields.';
                generalError.style.display = 'block';
                return;
            }

            if (isNaN(priceETH) || parseFloat(priceETH) <= 0) {
                generalError.textContent = 'Please enter a valid price greater than 0.';
                generalError.style.display = 'block';
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.value = 'Listing...';

                // ==================== SEPOLIA SMART CONTRACT (ACTIVE) ====================
                submitBtn.value = 'Connecting to Blockchain...';
                const liveDetails = await listPropertyOnBlockchain(propertyName, location, parseFloat(priceETH));
                submitBtn.value = 'Saving to Database...';

                // Testing fix: dummy owner so same wallet can buy
                const blockchainDetails = {
                    owner: "0x000000000000000000000000000000000000dEaD",
                    blockchainTx: liveDetails.blockchainTx,
                    contractAddress: liveDetails.contractAddress,
                    network: liveDetails.network,
                    tokenSymbol: liveDetails.tokenSymbol,
                    blockchainPropertyId: liveDetails.blockchainPropertyId
                };
                // ==================== END ====================

                const response = await fetch('/list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Name: propertyName,
                        city: location,
                        price: parseFloat(priceETH) * ethToINR,
                        priceInETH: parseFloat(priceETH),
                        amenities: selectedAmenities,
                        owner: blockchainDetails.owner,
                        email: userEmail || "demo@blockproperty.io",
                        blockchainTx: blockchainDetails.blockchainTx,
                        contractAddress: blockchainDetails.contractAddress,
                        network: blockchainDetails.network,
                        blockchainPropertyId: blockchainDetails.blockchainPropertyId,
                        isSold: false,
                        listedAt: new Date().toISOString(),
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Failed to save to database.');

                successMessage.textContent = '✅ Property listed successfully with blockchain details!';
                successMessage.style.display = 'block';
                form.reset();
                ethPriceInfo.textContent = '';

                setTimeout(() => window.location.href = '/', 2000);

            } catch (error) {
                console.error(error);
                generalError.textContent = error.message || 'Error listing property. Please try again.';
                generalError.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.value = 'List Property';
            }
        });
    </script>
</body>
</html>
